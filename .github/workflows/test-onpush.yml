name: Medium Tests On Push

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test-oncommit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      
      # Test Medium Includes Fast Tests
      - run: npm run test:medium -- --reporter=default --reporter=junit --outputFile=test-results/medium-node.xml
      - run: npm run test:medium:wrangler -- --reporter=default --reporter=junit --outputFile=test-results/medium-wrangler.xml

      # Upload Test Results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: medium-test-results
          path: test-results/*.xml

      # Generate Detailed Test Report
      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Medium Tests On Push
          path: test-results/*.xml
          reporter: java-junit
