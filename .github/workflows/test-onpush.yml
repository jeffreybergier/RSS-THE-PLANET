name: Medium Tests On Push

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test-onpush:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci

      # 1. Ensure the directory exists
      - name: Create Test Results Directory
        run: mkdir -p test-results

      # 2. Run Linting
      - name: Run ESLint
        continue-on-error: true
        run: npm run lint

      # 3. Run Node Tests
      # We call the sub-scripts directly to ensure flags are passed correctly
      - name: Node Fast and Medium
        continue-on-error: true
        run: |
          npm run test:fast -- --reporter=default --reporter=junit --outputFile=test-results/node-fast.xml
          npm run test:e2e:fast -- --reporter=default --reporter=junit --outputFile=test-results/node-e2e-fast.xml
     
      # 3. Run Wrangler Tests
      - name: Wrangler Fast and Medium
        continue-on-error: true
        run: |
          npm run test:fast:wrangler -- --reporter=default --reporter=junit --outputFile=test-results/wrangler-fast.xml
          npm run test:e2e:fast:wrangler -- --reporter=default --reporter=junit --outputFile=test-results/wrangler-e2e-fast.xml
      
      # Upload Test Results
      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: medium-test-results
          path: test-results/*.xml

      # Generate Detailed Test Report
      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Medium Tests On Push
          path: test-results/*.xml
          reporter: java-junit